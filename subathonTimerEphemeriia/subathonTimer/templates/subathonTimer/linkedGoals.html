{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel='icon' href="{% static 'bingo/images/cacatchu.png' %}" />
        <title>Likend goal</title>
        <link rel="stylesheet"
              type="text/css"
              href="{% static 'subathonTimer/css/linkedGoals.css' %}" />
    </head>
    <body>
        <div class="background-overlay">
            <div class="header">
                <div class="goal-info">
                    <p class="next-text">GOAL -</p>
                    <p class="next-goal" id="next-goal"></p>
                </div>
            </div>
            <div class="progress-container" id="progress-container">
                <div class="progress-wrapper" id="progress-wrapper">
                    {% for goal in goals %}
                        <div class="goal-progress" id="goal-progress-{{ goal.id }}">
                            <div class="progress-bar">
                                <div class="progress-bar-fill" id="progress-bar-fill"></div>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </body>
    {{ goals|json_script:"goals-data" }}
    {{ current_amount|json_script:"current-amount-data" }}
    {{ slice_goals|json_script:"slice-goals-data" }}
    <script src="{% static 'subathonTimer/js/linkedGoals.js' %}" type="module"></script>
</html>
